<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <rect width="512" height="512" rx="120" fill="#0A0A0C" />
  <rect x="20" y="20" width="472" height="472" rx="100" fill="none" stroke="#262626" stroke-width="4" stroke-dasharray="12 8" />

  <g transform="translate(0, 0)">
    <path d="M256 110 L130 380" stroke="url(#ashareGreen)" stroke-width="28" stroke-linecap="round" />
    <line x1="130" y1="380" x2="115" y2="410" stroke="#52C41A" stroke-width="8" stroke-linecap="round" />
    
    <path d="M256 110 L382 380" stroke="url(#ashareRed)" stroke-width="28" stroke-linecap="round" filter="url(#redGlow)" />
    <line x1="256" y1="65" x2="256" y2="110" stroke="#FF4D4F" stroke-width="8" stroke-linecap="round" filter="url(#redGlow)" />
    <line x1="382" y1="380" x2="395" y2="410" stroke="#FF4D4F" stroke-width="8" stroke-linecap="round" />

    <g transform="translate(256, 300)">
      <circle cx="0" cy="0" r="48" fill="#141414" stroke="#FF4D4F" stroke-width="3" filter="url(#redGlow)" />
      <circle cx="0" cy="0" r="42" fill="#D32F2F" />
      <circle cx="0" cy="0" r="26" fill="none" stroke="#141414" stroke-width="2" opacity="0.6" />
      <circle cx="0" cy="0" r="8" fill="#141414" />
      
      <g transform="rotate(0)">
        <circle cx="0" cy="-26" r="5" fill="#141414" />
        <path d="M 0 -31 A 5 5 0 0 1 5 -26 C 5 -20 -2 -16 -4 -16 C -1 -18 0 -22 0 -26 Z" fill="#141414" />
      </g>
      <g transform="rotate(120)">
        <circle cx="0" cy="-26" r="5" fill="#141414" />
        <path d="M 0 -31 A 5 5 0 0 1 5 -26 C 5 -20 -2 -16 -4 -16 C -1 -18 0 -22 0 -26 Z" fill="#141414" />
      </g>
      <g transform="rotate(240)">
        <circle cx="0" cy="-26" r="5" fill="#141414" />
        <path d="M 0 -31 A 5 5 0 0 1 5 -26 C 5 -20 -2 -16 -4 -16 C -1 -18 0 -22 0 -26 Z" fill="#141414" />
      </g>
    </g>
    
    <line x1="165" y1="300" x2="204" y2="300" stroke="#FF4D4F" stroke-width="4" opacity="0.4" />
    <line x1="308" y1="300" x2="347" y2="300" stroke="#FF4D4F" stroke-width="4" opacity="0.4" />
  </g>

  <defs>
    <linearGradient id="ashareRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7875" />
      <stop offset="100%" stop-color="#FF4D4F" />
